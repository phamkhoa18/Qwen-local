<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }} — Trợ Lý Pháp Luật AI</title>
  <meta name="description" content="Hệ thống AI Pháp Luật cho Viện Kiểm Sát Nhân Dân Việt Nam. Hỗ trợ tra cứu, phân tích và giải thích pháp luật 24/7.">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<svg style="display:none">
  <symbol id="i-scales" viewBox="0 0 24 24"><path d="M12 3v18M3 7l4 8h10l4-8M7 15a4 4 0 004-4M17 15a4 4 0 01-4-4M5 7h14"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
  <symbol id="i-chat" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
  <symbol id="i-brain" viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 2.5-1.3 4.7-3.2 6H8.2C6.3 13.7 5 11.5 5 9a7 7 0 017-7zM9 22h6M10 18h4"/></symbol>
  <symbol id="i-key" viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></symbol>
  <symbol id="i-chart" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></symbol>
  <symbol id="i-database" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></symbol>
  <symbol id="i-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></symbol>
  <symbol id="i-send" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z" fill="currentColor" stroke="none"/></symbol>
  <symbol id="i-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
  <symbol id="i-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></symbol>
  <symbol id="i-book" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></symbol>
  <symbol id="i-file" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></symbol>
  <symbol id="i-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></symbol>
</svg>

<!-- APP -->
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-icon"><svg><use href="#i-scales"/></svg></div>
        <div>
          <h2>VKS Legal AI</h2>
          <span class="version">Phiên bản {{ version }}</span>
        </div>
      </div>
      <button class="btn-new-chat" onclick="newConversation()">
        <svg class="icon-svg sm"><use href="#i-plus"/></svg> Cuộc trò chuyện mới
      </button>
    </div>
    <div class="conv-list" id="conv-list"></div>
    <div class="sidebar-footer">
      <button class="sidebar-nav-btn" onclick="openRagModal()"><svg class="icon-svg"><use href="#i-database"/></svg> Cơ sở dữ liệu pháp luật</button>
      <button class="sidebar-nav-btn" onclick="openApiKeysModal()"><svg class="icon-svg"><use href="#i-key"/></svg> Quản lý API Keys</button>
      <button class="sidebar-nav-btn" onclick="openStatsModal()"><svg class="icon-svg"><use href="#i-chart"/></svg> Thống kê sử dụng</button>
      <button class="sidebar-nav-btn" onclick="openSettingsModal()"><svg class="icon-svg"><use href="#i-settings"/></svg> Cài đặt</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="mode-tabs" id="mode-tabs">
          <button class="mode-tab active" data-mode="llm" onclick="setMode('llm')">
            <svg class="icon-svg sm"><use href="#i-brain"/></svg> Hỏi AI trực tiếp
          </button>
          <button class="mode-tab" data-mode="rag" onclick="setMode('rag')">
            <svg class="icon-svg sm"><use href="#i-book"/></svg> Tra cứu & Hỏi đáp
          </button>
          <button class="mode-tab" data-mode="search" onclick="setMode('search')">
            <svg class="icon-svg sm"><use href="#i-search"/></svg> Tìm kiếm văn bản
          </button>
        </div>
        <select class="model-select" id="model-select">
          <option value="{{ default_model }}">{{ default_model }}</option>
        </select>
      </div>
      <div class="topbar-right">
        <div class="rag-status off" id="rag-badge"><span class="status-dot off"></span> Đang tải...</div>
      </div>
    </div>

    <!-- INDEXING PROGRESS BANNER -->
    <div class="indexing-banner" id="idx-banner">
      <div class="ib-inner">
        <div class="ib-text">
          <div class="spinner"></div> 
          <span id="idx-text">Hệ thống đang tự động tải và phân tích dữ liệu pháp luật...</span>
        </div>
        <div class="ib-bar"><div class="ib-fill" id="idx-fill"></div></div>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <!-- WELCOME -->
      <div class="welcome" id="welcome">
        <h2>Chào <span class="highlight">buổi sáng</span></h2>
        <p>Mình có thể giúp gì cho bạn?</p>
        <div class="chips" id="chips">
          <button class="chip" onclick="usePrompt('Phân tích cấu thành tội phạm Trộm cắp tài sản theo Điều 173 BLHS 2015')">
            <svg><use href="#i-search"/></svg> Phân tích Điều 173 BLHS 2015
          </button>
          <button class="chip" onclick="usePrompt('So sánh hình phạt giữa tội Cướp và Cưỡng đoạt tài sản')">
            <svg><use href="#i-scales"/></svg> So sánh tội Cướp và Cưỡng đoạt
          </button>
          <button class="chip" onclick="usePrompt('Quyền và nghĩa vụ của kiểm sát viên trong giai đoạn điều tra')">
            <svg><use href="#i-book"/></svg> Quyền & nghĩa vụ của KSV
          </button>
          <button class="chip" onclick="usePrompt('Trình tự khởi tố vụ án hình sự theo pháp luật Việt Nam')">
            <svg><use href="#i-file"/></svg> Trình tự khởi tố vụ án
          </button>
        </div>
      </div>

      <div class="msg-list" id="messages"></div>
      <div class="typing" id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <!-- INPUT -->
    <div class="input-bar">
      <div class="input-box">
        <textarea id="chat-input" placeholder="Bạn muốn hỏi gì?" rows="1"></textarea>
        <div class="input-bottom">
          <div class="input-bottom-left">
            <span class="input-mode-tag" id="input-hint">Tra cứu & Hỏi đáp</span>
          </div>
          <button class="btn-send" id="btn-send" onclick="sendMessage()">
            <svg><use href="#i-send"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Câu trả lời chỉ mang tính tham khảo, vui lòng kiểm chứng với văn bản gốc.</div>
    </div>

    <div class="status-bar">
      <span class="status-item" id="st-ollama"><span class="status-dot off"></span> Ollama</span>
      <span class="status-item" id="st-rag"><span class="status-dot off"></span> RAG</span>
      <span class="status-item" id="st-chunks">0 đoạn văn bản</span>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modal-title"></h3>
      <button class="modal-x" onclick="closeModal()"><svg class="icon-svg"><use href="#i-x"/></svg></button>
    </div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
