version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: vks-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  vks-api:
    build: .
    container_name: vks-legal-ai
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./data:/app/data

volumes:
  mongodb_data:
