version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: vks-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"

  vks-api:
    build: .
    container_name: vks-api
    restart: always
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=VKS Legal AI
      - APP_VERSION=2.0.0
      - DEBUG=false
      - SECRET_KEY=vks-legal-ai-secret-2024-production
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=vks_legal_ai
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DEFAULT_MODEL=qwen3:30b-a3b
      - EMBEDDING_MODEL=mainguyen9/vietlegal-harrier-0.6b
      - VECTOR_STORE_PATH=/app/data/vector_store
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=vks@2024
      - AUTO_INDEX=true
      - AUTO_INDEX_MAX_DOCS=10000
      - TOP_K=5
      - SIMILARITY_THRESHOLD=0.35
    volumes:
      - vks_data:/app/data
    depends_on:
      - mongodb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vks-tunnel
    restart: always
    command: tunnel --no-autoupdate --url http://vks-api:8000
    depends_on:
      - vks-api

volumes:
  mongodb_data:
  vks_data:
