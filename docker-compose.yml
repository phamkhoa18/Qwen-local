version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: vks-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"

  vks-api:
    build: .
    container_name: vks-api
    restart: always
    network_mode: "host"
    environment:
      - APP_NAME=VKS Legal AI
      - APP_VERSION=3.0.0
      - DEBUG=false
      - SECRET_KEY=vks-legal-ai-secret-2024-production
      - MONGODB_URI=mongodb://localhost:27017
      - MONGODB_DB=vks_legal_ai
      - OLLAMA_BASE_URL=http://localhost:11434
      - DEFAULT_MODEL=qwen3:30b-a3b
      - EMBEDDING_MODEL=mainguyen9/vietlegal-harrier-0.6b
      - VECTOR_STORE_PATH=/app/data/vector_store
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=vks@2024
      - AUTO_INDEX=false
      - AUTO_INDEX_MAX_DOCS=200000
      - TOP_K=8
      - SIMILARITY_THRESHOLD=0.40
      - AGENT_ENABLED=true
      - HF_HUB_OFFLINE=1
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./data:/app/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      - mongodb

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vks-tunnel
    restart: always
    network_mode: "host"
    command: tunnel --no-autoupdate --config /home/nonroot/.cloudflared/config.yml run vks-legal-ai
    volumes:
      - ~/.cloudflared:/home/nonroot/.cloudflared
    depends_on:
      - vks-api

volumes:
  mongodb_data:
